<!-- ===== LOGIN PAGE - KING COFFEE ===== -->
<section class="login-page" style="min-height:100vh; position:relative; display:flex; flex-direction:column;">

  <!-- Background -->
  <div style="position:absolute; inset:0; z-index:0;">
    <!-- Dark coffee background with gradient overlay -->
    <div style="position:absolute; inset:0; background: linear-gradient(180deg, #1a0e05 0%, #2C1A0E 40%, #1a0e05 100%);"></div>
    <!-- Bokeh effect -->
    <div style="position:absolute; inset:0; background: radial-gradient(circle at 20% 30%, rgba(200,160,80,0.15) 0%, transparent 50%), radial-gradient(circle at 80% 20%, rgba(200,130,50,0.1) 0%, transparent 40%), radial-gradient(circle at 50% 80%, rgba(200,87,44,0.08) 0%, transparent 50%);"></div>
  </div>

  <!-- Main content area -->
  <div style="flex:1; display:flex; align-items:center; justify-content:center; position:relative; z-index:1; padding:60px 20px;">

    <!-- Login Card -->
    <div style="max-width:440px; width:100%; background:rgba(255,255,255,0.97); border-radius:16px; padding:48px 40px; box-shadow:0 20px 60px rgba(0,0,0,0.3); backdrop-filter:blur(10px);">

      <div style="text-align:center; margin-bottom:32px;">
        <h1 style="font-family:'Playfair Display',serif; font-size:1.75rem; font-weight:700; color:#2C1A0E; margin-bottom:8px;">
          Chào mừng trở lại
        </h1>
        <p style="color:#7A6A5A; font-size:0.85rem; line-height:1.5;">
          Đăng nhập để tiếp tục hành trình khám phá hương vị cà phê di sản.
        </p>
      </div>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

        <!-- Email -->
        <div style="margin-bottom:20px;">
          <label style="display:block; font-size:0.75rem; font-weight:700; color:#2C1A0E; margin-bottom:8px;">
            Email hoặc Số điện thoại
          </label>
          <input type="email" name="email" [(ngModel)]="data.email" #email="ngModel" required
            placeholder="Nhập email của bạn"
            style="width:100%; padding:14px 16px; border:1px solid #EDE5D8; border-radius:8px; font-size:0.875rem; color:#2C1A0E; background:#FAF7F3; outline:none; transition:border 0.2s;"
            onfocus="this.style.borderColor='#C8572C'" onblur="this.style.borderColor='#EDE5D8'">
          @if(email.invalid && email.touched) {
            <p style="color:#e3000f; font-size:0.7rem; margin-top:4px;">Vui lòng nhập email hợp lệ.</p>
          }
        </div>

        <!-- Password -->
        <div style="margin-bottom:24px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label style="font-size:0.75rem; font-weight:700; color:#2C1A0E;">Mật khẩu</label>
            <a routerLink="/users/forgotpassword" style="font-size:0.75rem; color:#C8572C; font-weight:600; text-decoration:none;">Quên mật khẩu?</a>
          </div>
          <input type="password" name="password" [(ngModel)]="data.password" #password="ngModel" required
            placeholder="••••••••"
            style="width:100%; padding:14px 16px; border:1px solid #EDE5D8; border-radius:8px; font-size:0.875rem; color:#2C1A0E; background:#FAF7F3; outline:none; transition:border 0.2s;"
            onfocus="this.style.borderColor='#C8572C'" onblur="this.style.borderColor='#EDE5D8'">
          @if(password.invalid && password.touched) {
            <p style="color:#e3000f; font-size:0.7rem; margin-top:4px;">Vui lòng nhập mật khẩu.</p>
          }
        </div>

        <!-- Submit -->
        <button type="submit"
          style="width:100%; padding:14px; background:#C8572C; color:#fff; font-weight:700; font-size:0.9rem; border:none; border-radius:8px; cursor:pointer; transition:all 0.3s; letter-spacing:0.5px; margin-bottom:24px;"
          onmouseover="this.style.background='#A85131'" onmouseout="this.style.background='#C8572C'">
          Đăng nhập
        </button>

        <!-- Divider -->
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:24px;">
          <div style="flex:1; height:1px; background:#EDE5D8;"></div>
          <span style="font-size:0.7rem; color:#A09383; text-transform:uppercase; letter-spacing:1px; font-weight:600;">Hoặc đăng nhập với</span>
          <div style="flex:1; height:1px; background:#EDE5D8;"></div>
        </div>

        <!-- Social Login -->
        <div style="display:flex; gap:12px; margin-bottom:28px;">
          <button type="button"
            style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border:1px solid #EDE5D8; border-radius:8px; background:#fff; cursor:pointer; font-size:0.8rem; font-weight:600; color:#2C1A0E; transition:all 0.2s;"
            onmouseover="this.style.borderColor='#C8572C'" onmouseout="this.style.borderColor='#EDE5D8'">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Tiếp tục với Google
          </button>
          <button type="button"
            style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; border:1px solid #EDE5D8; border-radius:8px; background:#fff; cursor:pointer; font-size:0.8rem; font-weight:600; color:#2C1A0E; transition:all 0.2s;"
            onmouseover="this.style.borderColor='#C8572C'" onmouseout="this.style.borderColor='#EDE5D8'">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Tiếp tục với Facebook
          </button>
        </div>
      </form>

      <!-- Register link -->
      <p style="text-align:center; font-size:0.85rem; color:#7A6A5A;">
        Bạn chưa có tài khoản? <a routerLink="/users/register" style="color:#C8572C; font-weight:700; text-decoration:none;">Đăng ký ngay</a>
      </p>

    </div>
  </div>

</section>
