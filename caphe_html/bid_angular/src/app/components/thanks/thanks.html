<div class="w-full mx-auto px-4 py-4 flex  justify-center">
<div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
    <!-- Header  -->
    <div class="bg-gradient-to-r from-accent to-accent-light p-8 md:p-12 text-center relative overflow-hidden">
        <!-- Decorative circles -->
        <div class="absolute top-0 left-0 w-64 h-64 bg-white/10 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
        <div class="absolute bottom-0 right-0 w-64 h-64 bg-white/10 rounded-full translate-x-1/2 translate-y-1/2"></div>
        
        <!-- Success Icon -->
        <div class="relative mb-6">
            <div class="inline-flex items-center justify-center w-24 h-24 md:w-32 md:h-32 bg-white rounded-full animate-scale-in shadow-lg">
                <svg class="w-12 h-12 md:w-16 md:h-16" viewBox="0 0 52 52">
                    <circle class="checkmark" cx="26" cy="26" r="22" fill="none" stroke="#D4AF37" stroke-width="4"/>
                    <path class="checkmark" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round" d="M14 27l8 8 16-16"/>
                </svg>
            </div>
        </div>
        
        <!-- Title -->
        <h2 class="font-heading text-3xl md:text-3xl lg:text-4xl font-bold text-primary mb-4">
            {{title_message}}
        </h2>
    </div>
    <!-- Content -->
    <div class="p-8 md:p-12">
        <!-- Main Message -->
        <div class="text-center mb-8">
            <p class="text-1xl md:text-2xl lg:text-3xl font-heading font-semibold text-neutral-text mb-4 leading-relaxed">
                {{message}}
            </p>
        </div>

        <!-- Countdown and Button -->
        <div class="text-center space-y-8">
            <a href="index.html" class="inline-flex items-center justify-center gap-3 bg-accent hover:bg-accent-dark text-primary font-bold px-8 py-4 rounded-lg transition transform hover:scale-105 shadow-lg text-lg">
                <i class="fas fa-home"></i>
                <span>Về Trang Chủ</span>
            </a>
            
            <div class="flex text-lg items-center justify-center gap-2 text-neutral-text-light">
                <i class="fas fa-clock"></i>
                <span>Tự động chuyển về trang chủ sau</span>
                <span class="inline-flex items-center justify-center w-12 h-12 bg-accent text-primary font-bold text-xl rounded-full pulse-animation" id="countdown">
                    {{count()}}
                </span>
                <span>giây</span>
            </div>
        </div>
    </div>
</div>
</div>
