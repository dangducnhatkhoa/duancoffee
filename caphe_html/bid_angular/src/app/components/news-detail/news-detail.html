<!-- Breadcrumb -->
<div class="bg-white border-b border-[#EDE5D8]">
  <div class="container mx-auto px-6 py-3" style="max-width:1200px;">
    <nav class="flex text-sm" aria-label="Breadcrumb">
      <ol class="inline-flex items-center space-x-1 md:space-x-3">
        <li class="inline-flex items-center">
          <a routerLink="/" class="text-[#7A6A5A] hover:text-[#C8572C] transition font-medium">Trang chủ</a>
        </li>
        <li>
          <div class="flex items-center">
            <i class="fas fa-chevron-right text-[#D1C4B0] mx-2 text-[10px]"></i>
            <a routerLink="/news" class="text-[#7A6A5A] hover:text-[#C8572C] transition font-medium">Tin tức</a>
          </div>
        </li>
        <li aria-current="page">
          <div class="flex items-center">
            <i class="fas fa-chevron-right text-[#D1C4B0] mx-2 text-[10px]"></i>
            <span class="text-[#2C1A0E] font-semibold truncate max-w-[200px] sm:max-w-[400px]">{{article?.tieu_de}}</span>
          </div>
        </li>
      </ol>
    </nav>
  </div>
</div>

<section style="background:#FAF7F3; min-height:80vh; padding:60px 0;">
  <div class="container mx-auto px-6" style="max-width:800px;">
    @if (article) {
      <div class="bg-white rounded-lg p-8 md:p-12 shadow-sm" style="border:1px solid #EDE5D8;">
        <!-- Header -->
        <div style="text-align:center; margin-bottom:30px;">
          <div style="font-size:0.85rem; color:#C8572C; font-weight:700; text-transform:uppercase; margin-bottom:12px; letter-spacing:0.5px;">
            {{article.ngay_dang | date:'dd/MM/yyyy'}} • {{article.luot_xem}} lượt xem
          </div>
          <h1 style="font-family:'Playfair Display',serif; font-size:2.5rem; font-weight:700; color:#2C1A0E; line-height:1.3; margin-bottom:20px;">
            {{article.tieu_de}}
          </h1>
        </div>

        <!-- Hero Image -->
        @if (article.hinh) {
          <div style="margin-bottom:40px; border-radius:8px; overflow:hidden;">
            <img [src]="article.hinh" [alt]="article.tieu_de" style="width:100%; height:auto;" />
          </div>
        }

        <!-- Content -->
        <div class="article-content" style="color:#5A4A3A; font-size:1.05rem; line-height:1.8;" [innerHTML]="article.noi_dung">
        </div>

        <!-- Back button -->
        <div style="margin-top:50px; text-align:center;">
          <a routerLink="/news" style="display:inline-block; padding:12px 24px; border:1px solid #C8572C; color:#C8572C; font-weight:600; border-radius:4px; text-decoration:none; transition:all 0.3s;"
             onmouseover="this.style.background='#C8572C'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='#C8572C';">
            <i class="fas fa-arrow-left mr-2"></i> Quay lại trang Tin tức
          </a>
        </div>
      </div>
    } @else {
      <div style="text-align:center; padding:40px; color:#7A6A5A;">
        Đang tải bài viết...
      </div>
    }
  </div>
</section>
