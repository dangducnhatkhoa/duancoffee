<div class="p-8 mx-auto rounded-lg shadow-lg">
    <div class="bg-white rounded-lg shadow-sm p-8 ">
        <!-- Header -->
        <h2 class="text-3xl font-bold text-gray-800 mb-8">Thêm/ Sửaloại sản phẩm</h2>

        <!-- Form -->
        <form (ngSubmit)="onSubmit()" id="categoryForm" class="space-y-6">
            <!-- Tên loại -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Tên loại <span class="text-red-500">*</span>
                </label>
                <input 
                    [(ngModel)]="category().name"
                    type="text" name="name"  id="categoryName" required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
                    placeholder="VD: Đồng hồ cao cấp"
                    (input)="generateSlug()"
                >
            </div>

            <!-- Slug (auto-generated) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Đường dẫn (Slug) <span class="text-red-500">*</span>
                </label>
                <div class="relative">
                    <input 
                        [(ngModel)]="category().slug"
                        type="text"  name="slug" id="categorySlug" required readonly
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-600 text-base"
                        placeholder="dong-ho-cao-cap"
                    >
                    <div class="absolute right-3 top-3">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Icon upload -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Icon loại
                </label>
                <div class="flex items-start space-x-4">
                    <div class="flex-shrink-0">
                        <div id="iconPreview" class="w-24 h-24 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 overflow-hidden">
                            <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="flex-1">
                        <input 
                            type="file" name="icon"  id="categoryIcon" accept="image/*"
                            class="hidden" (change)="previewIcon($event)"
                        >
                        <label 
                            for="categoryIcon" 
                            class="inline-block px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 cursor-pointer transition-colors"
                        >
                            Chọn file
                        </label>
                        <button 
                            type="button"  (click)="removeIcon()"
                            class="ml-2 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-red-600 hover:bg-red-50 cursor-pointer transition-colors"
                        >
                            Xóa
                        </button>
                        <p class="mt-2 text-xs text-gray-500">
                            Định dạng: JPG, PNG, SVG. Kích thước tối đa: 2MB
                        </p>
                    </div>
                </div>
            </div>

            <!-- Thứ tự hiển thị -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Thứ tự hiển thị
                </label>
                <input 
                    [(ngModel)]="category().display_order"
                    type="number"  name="display_order" value="0" min="0"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-base"
                    placeholder="0"
                >
                <p class="mt-1 text-xs text-gray-500">Số thứ tự càng nhỏ sẽ hiển thị càng trước</p>
            </div>

            <!-- Trạng thái -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Trạng thái
                </label>
                <div class="flex items-center space-x-6">
                    <label class="flex items-center cursor-pointer">
                    <input 
                        [(ngModel)]="category().status" [value]="'active'" 
                        type="radio" name="status" 
                        class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500"
                    >
                        <span class="ml-2 text-sm text-gray-700">Hoạt động</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                    <input 
                        [(ngModel)]="category().status" [value]="'inactive'" 
                        type="radio"  name="status" 
                        class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500"
                    >
                        <span class="ml-2 text-sm text-gray-700">Không hoạt động</span>
                    </label>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center justify-between pt-6 border-t border-gray-200">
                <a href="/category" class="text-blue-600 hover:text-blue-800 font-medium flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                    Danh sách loại
                </a>
                <div class="flex space-x-4">
                    <button 
                        type="button" 
                        (click)="resetForm()"
                        class="px-6 py-3 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors font-medium"
                    >
                        Xóa nhập lại
                    </button>
                    <button 
                        type="submit"
                        class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium"
                    >
                        Lưu thông tin
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
