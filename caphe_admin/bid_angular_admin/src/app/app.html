@if (!isLoginPage) {
  <div class="flex h-screen bg-[#F5F0EB]">
    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-[#3E2723] to-[#2C1810] text-white flex flex-col shadow-xl">
      <div class="p-6 border-b border-white/10">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-[#D4A574] flex items-center justify-center text-[#3E2723]">
            <i class="fas fa-mug-hot"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold">Coffee Admin</h1>
            <p class="text-xs text-white/60">Quản trị cửa hàng</p>
          </div>
        </div>
      </div>

      <div class="px-6 py-3 text-sm text-white/70 border-b border-white/10">
        <i class="far fa-calendar mr-2"></i>{{ currentDate }}
      </div>

      <nav class="flex-1 py-4 space-y-1">
        <a routerLink="/dashboard" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-tachometer-alt w-5"></i> Dashboard
        </a>
        <a routerLink="/product" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-coffee w-5"></i> Sản phẩm
        </a>
        <a routerLink="/category" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-tags w-5"></i> Danh mục
        </a>
        <a routerLink="/orders" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-shopping-bag w-5"></i> Đơn hàng
        </a>
        <a routerLink="/users" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-users w-5"></i> Người dùng
        </a>
        <a routerLink="/vouchers" routerLinkActive="sidebar-active" class="sidebar-link">
          <i class="fas fa-ticket-alt w-5"></i> Mã giảm giá
        </a>
      </nav>

      <div class="border-t border-white/10 p-4">
        <div class="flex items-center gap-3 mb-3 px-2">
          <img [src]="'https://ui-avatars.com/api/?name=' + (currentUser?.full_name || 'Admin') + '&background=D4A574&color=3E2723'"
               class="w-9 h-9 rounded-full" alt="avatar">
          <div class="min-w-0">
            <p class="text-sm font-medium truncate">{{ currentUser?.full_name || 'Admin' }}</p>
            <p class="text-xs text-white/50 truncate">{{ currentUser?.email }}</p>
          </div>
        </div>
        <button (click)="logout()" class="w-full flex items-center gap-2 px-4 py-2 text-red-300 hover:bg-red-500/10 rounded-lg transition text-sm">
          <i class="fas fa-sign-out-alt"></i> Đăng xuất
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}
