<div class="p-8 max-w-4xl mx-auto">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 border-b border-[#EDE5D8] pb-4">
    <div>
      <h1 class="text-2xl font-bold text-[#3E2723]">
        {{ isEditMode ? 'Chỉnh Sửa Bài Viết Trang Chủ' : 'Thêm Bài Viết Mới Cho Trang Chủ' }}
      </h1>
      <p class="text-sm text-gray-500 mt-1">Soạn thảo bài viết tin tức, sự kiện hoặc kiến thức hiển thị tới khách hàng</p>
    </div>
    <a [routerLink]="['/articles']" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition text-sm font-medium flex items-center gap-2">
      <i class="fas fa-arrow-left"></i> Quay lại
    </a>
  </div>

  <!-- Form Container -->
  <form (ngSubmit)="onSubmit()" class="bg-white rounded-xl shadow-sm border border-[#EDE5D8] p-6 space-y-6">
    <!-- Tiêu đề -->
    <div>
      <label class="block text-sm font-semibold text-[#3E2723] mb-2">
        Tiêu Đề Bài Viết <span class="text-red-500">*</span>
      </label>
      <input type="text" [(ngModel)]="formData.tieu_de" name="tieu_de" required
             class="w-full px-4 py-2.5 bg-[#FAF7F3] border border-[#EDE5D8] rounded-lg text-sm focus:outline-none focus:border-[#8D5B4C]"
             placeholder="Nhập tiêu đề hấp dẫn cho bài viết (VD: Bí Quyết Pha Cà Phê Phin Ngon Chuẩn Vị)...">
    </div>

    <!-- Hình ảnh bài viết -->
    <div>
      <label class="block text-sm font-semibold text-[#3E2723] mb-2">Hình Ảnh Minh Họa</label>
      <div class="flex items-start gap-6">
        <div class="flex-1">
          <input type="file" (change)="onFileSelected($event)" accept="image/*"
                 class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-[#8D5B4C] file:text-white hover:file:bg-[#6D3E32] cursor-pointer">
          <p class="text-xs text-gray-400 mt-2">Định dạng hỗ trợ: JPG, PNG, WEBP. Dung lượng tối đa 5MB.</p>
        </div>
        <div *ngIf="imagePreview" class="w-36 h-24 rounded-lg overflow-hidden border border-[#EDE5D8] bg-gray-50 flex items-center justify-center flex-shrink-0">
          <img [src]="imagePreview" alt="Preview" class="w-full h-full object-cover">
        </div>
      </div>
    </div>

    <!-- Nội dung bài viết -->
    <div>
      <label class="block text-sm font-semibold text-[#3E2723] mb-2">
        Nội Dung Bài Viết <span class="text-red-500">*</span>
      </label>
      <textarea [(ngModel)]="formData.noi_dung" name="noi_dung" rows="12" required
                class="w-full px-4 py-3 bg-[#FAF7F3] border border-[#EDE5D8] rounded-lg text-sm focus:outline-none focus:border-[#8D5B4C]"
                placeholder="Nhập toàn bộ nội dung bài viết chi tiết tại đây..."></textarea>
    </div>

    <!-- Lượt xem và tương tác -->
    <div>
      <label class="block text-sm font-semibold text-[#3E2723] mb-2">Số Lượt Xem</label>
      <input type="number" [(ngModel)]="formData.luot_xem" name="luot_xem" min="0"
             class="w-full max-w-xs px-4 py-2 bg-[#FAF7F3] border border-[#EDE5D8] rounded-lg text-sm focus:outline-none focus:border-[#8D5B4C]"
             placeholder="Nhập số lượt xem...">
    </div>

    <!-- Trạng thái hiển thị -->
    <div class="flex items-center gap-3 pt-2">
      <input type="checkbox" id="an_hien" [(ngModel)]="formData.an_hien" name="an_hien"
             class="w-5 h-5 accent-[#8D5B4C] rounded cursor-pointer">
      <label for="an_hien" class="text-sm font-medium text-[#3E2723] cursor-pointer">
        Cho phép hiển thị công khai trên trang chủ ngay sau khi lưu
      </label>
    </div>

    <!-- Buttons -->
    <div class="flex items-center justify-end gap-3 pt-4 border-t border-[#EDE5D8]">
      <a [routerLink]="['/articles']" class="px-6 py-2.5 border border-[#EDE5D8] text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition">
        Hủy bỏ
      </a>
      <button type="submit" [disabled]="isSubmitting"
              class="bg-[#8D5B4C] text-white px-8 py-2.5 rounded-lg text-sm font-semibold hover:bg-[#6D3E32] transition flex items-center gap-2 disabled:opacity-50">
        <i *ngIf="isSubmitting" class="fas fa-spinner fa-spin"></i>
        <span>{{ isEditMode ? 'Lưu Thay Đổi' : 'Đăng Bài Viết' }}</span>
      </button>
    </div>
  </form>
</div>
